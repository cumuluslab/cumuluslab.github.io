<!DOCTYPE html>
<html>
<head>
  <title>Flappy Bird Pro</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let groundHeight = 100;

// 🎧 SOUND
const flapSound = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3");
const scoreSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const hitSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg");
const gameMusic = new Audio("https://cdn.pixabay.com/audio/2022/08/04/audio_2dde668d05.mp3");
gameMusic.loop = true;

// 🐤 BIRD
let bird = {
  x: 80,
  y: canvas.height/2,
  size: 20,
  gravity: 0.4,
  lift: -8,
  velocity: 0
};

// 🎮 GAME STATE
let pipes = [];
let frame = 0;
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
let gameState = "start";

// 🔥 ADDICTIVE SYSTEMS
let combo = 0;
let comboTimer = 0;
let particles = [];
let shake = 0;
let flash = 0;
let speed = 3;

// 🎨 SKY
function drawSky() {
  ctx.fillStyle = "#4facfe";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// 🐤 BIRD
function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.velocity * 0.05);

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(0,0,bird.size,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// 🌿 PIPES
function drawPipes() {
  pipes.forEach(pipe => {
    ctx.fillStyle = "green";
    ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
    ctx.fillRect(pipe.x,pipe.bottom,pipe.width,canvas.height);
  });
}

// ✨ PARTICLES
function createParticles(x,y){
  for(let i=0;i<5;i++){
    particles.push({
      x,y,
      vx:Math.random()*2-1,
      vy:Math.random()*2-1,
      life:30
    });
  }
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.fillStyle="rgba(255,255,255,"+p.life/30+")";
    ctx.fillRect(p.x,p.y,3,3);
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);
}

// ⚙️ LOGIC
function updatePipes() {
  if(frame % 100 === 0){
    let top = Math.random()*200+50;
    pipes.push({
      x: canvas.width,
      width:60,
      top:top,
      bottom:top+160,
      passed:false
    });
  }

  speed = 3 + Math.min(score*0.05,4);

  pipes.forEach(pipe=>{
    pipe.x -= speed;

    // 🎯 SCORE + COMBO
    if(!pipe.passed && pipe.x + pipe.width < bird.x){
      combo++;
      comboTimer = 60;
      score += combo;
      pipe.passed = true;
      play(scoreSound);
    }

    // ⚡ NEAR MISS
    if(Math.abs(bird.x - (pipe.x+pipe.width))<8 && !pipe.nearMiss){
      score += 2;
      pipe.nearMiss = true;
    }

    // 💀 COLLISION
    if(
      bird.x + bird.size > pipe.x &&
      bird.x - bird.size < pipe.x + pipe.width &&
      (bird.y - bird.size < pipe.top ||
       bird.y + bird.size > pipe.bottom)
    ){
      gameState="gameover";
      shake = 10;
      flash = 10;
      play(hitSound);
    }
  });

  pipes = pipes.filter(p=>p.x+p.width>0);
}

function updateBird(){
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if(bird.y > canvas.height-groundHeight){
    gameState="gameover";
    shake = 10;
    flash = 10;
  }
}

// 🔊 SOUND
function play(s){
  s.currentTime=0;
  s.play().catch(()=>{});
}

// 🔁 RESET
function resetGame(){
  bird.y = canvas.height/2;
  bird.velocity = 0;
  pipes = [];
  score = 0;
  combo = 0;
  gameState="start";
}

// 🎮 LOOP
function gameLoop(){
  ctx.save();

  // 💥 SHAKE
  if(shake>0){
    ctx.translate(Math.random()*shake-shake/2,Math.random()*shake-shake/2);
    shake*=0.9;
  }

  drawSky();
  drawPipes();
  drawBird();
  drawParticles();

  if(gameState==="playing"){
    updateBird();
    updatePipes();

    // 🎧 MUSIC SPEED
    gameMusic.playbackRate = 1 + Math.min(score*0.01,0.3);

    if(comboTimer>0) comboTimer--;
    else combo=0;

    ctx.fillText("Score: "+score,20,40);

    if(combo>1){
      ctx.fillText("🔥 x"+combo,20,70);
    }
  }

  if(gameState==="start"){
    ctx.fillText("Click to Start", canvas.width/2, canvas.height/2);
  }

  if(gameState==="gameover"){
    if(score>highScore){
      highScore=score;
      localStorage.setItem("highScore",highScore);
    }

    ctx.fillText("Game Over", canvas.width/2, canvas.height/2);
    ctx.fillText("Score: "+score, canvas.width/2, canvas.height/2+40);
    ctx.fillText("Click to Restart", canvas.width/2, canvas.height/2+80);
  }

  // 🔴 FLASH
  if(flash>0){
    ctx.fillStyle="rgba(255,0,0,"+flash/10+")";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    flash--;
  }

  ctx.restore();

  frame++;
  requestAnimationFrame(gameLoop);
}

// 🎮 INPUT
document.addEventListener("click",()=>{
  if(gameState==="start"){
    gameState="playing";
    gameMusic.play();
  }
  else if(gameState==="playing"){
    bird.velocity = bird.lift;
    createParticles(bird.x,bird.y);
    play(flapSound);
  }
  else{
    resetGame();
  }
});

gameLoop();
</script>

</body>
</html>
