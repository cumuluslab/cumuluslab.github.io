<!DOCTYPE html>
<html>
<head>
  <title>Cumulus Lab - Flappy Bird</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let groundHeight = 100;

// 🔊 SOUND
let soundsStarted = false;
const flapSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const scoreSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const hitSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg");
const bgMusic = new Audio("https://actions.google.com/sounds/v1/ambiences/birds_in_forest.ogg");

bgMusic.loop = true;
bgMusic.volume = 0.3;

function startSounds() {
  if (!soundsStarted) {
    bgMusic.play().catch(()=>{});
    soundsStarted = true;
  }
}

function play(sound) {
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

// 🐤 BIRD
let bird = {
  x: 80,
  y: canvas.height / 2,
  size: 20,
  gravity: 0.4,
  lift: -8,
  velocity: 0,
  flap: 0
};

let pipes = [];
let frame = 0;
let score = 0;
let gameState = "start";

// 🏆 LOCAL LEADERBOARD
let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

// ☁️ CLOUDS
let clouds = [
  {x: 100, y: 100},
  {x: 300, y: 150},
  {x: 600, y: 80}
];

// 🎨 DRAW
function drawSky() {
  let g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,"#70c5ce");
  g.addColorStop(1,"#dff6ff");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawClouds() {
  ctx.fillStyle = "white";
  clouds.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, 20, 0, Math.PI*2);
    ctx.arc(c.x+20, c.y, 20, 0, Math.PI*2);
    ctx.arc(c.x+10, c.y-15, 20, 0, Math.PI*2);
    ctx.fill();

    c.x -= 0.5;
    if (c.x < -50) c.x = canvas.width + 50;
  });
}

function drawGround() {
  ctx.fillStyle = "#ded895";
  ctx.fillRect(0, canvas.height-groundHeight, canvas.width, groundHeight);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(0,0,bird.size,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "orange";
  ctx.beginPath();
  ctx.ellipse(-5, bird.flap, 12, 6, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawPipes() {
  pipes.forEach(p=>{
    ctx.fillStyle="#2ecc71";
    ctx.fillRect(p.x,0,p.width,p.top);
    ctx.fillRect(p.x,p.bottom,p.width,canvas.height);
  });
}

// ⚙️ GAME LOGIC
function updatePipes() {
  if(frame%100===0){
    let top=Math.random()*200+50;
    let gap=160;

    pipes.push({
      x:canvas.width,
      width:60,
      top:top,
      bottom:top+gap,
      passed:false
    });
  }

  pipes.forEach(p=>{
    p.x-=3;

    if(!p.passed && p.x+p.width<bird.x){
      score++;
      p.passed=true;
      play(scoreSound);
    }

    if(
      bird.x+bird.size>p.x &&
      bird.x-bird.size<p.x+p.width &&
      (bird.y-bird.size<p.top || bird.y+bird.size>p.bottom)
    ){
      gameOver();
    }
  });

  pipes=pipes.filter(p=>p.x+p.width>0);
}

function updateBird() {
  bird.velocity+=bird.gravity;
  bird.y+=bird.velocity;
  bird.flap=Math.sin(frame*0.3)*8;

  if(bird.y+bird.size>canvas.height-groundHeight){
    gameOver();
  }
}

function drawText(t,s,y){
  ctx.fillStyle="white";
  ctx.font=s+"px Arial";
  ctx.textAlign="center";
  ctx.fillText(t, canvas.width/2, y);
}

// 💀 GAME OVER
function gameOver(){
  if(gameState!=="gameover"){
    gameState="gameover";
    play(hitSound);

    setTimeout(()=>{
      let name=prompt("Enter your name:");
      if(name){
        leaderboard.push({name,score});
        leaderboard.sort((a,b)=>b.score-a.score);
        leaderboard=leaderboard.slice(0,5);
        localStorage.setItem("leaderboard", JSON.stringify(leaderboard));
      }
    },300);
  }
}

// 🎮 LOOP
function gameLoop(){
  drawSky();
  drawClouds();
  drawPipes();
  drawGround();
  drawBird();

  if(gameState==="start"){
    drawText("Tap to Start",40,canvas.height/2);
  }

  if(gameState==="playing"){
    updateBird();
    updatePipes();
    drawText("Score: "+score,20,40);
  }

  if(gameState==="gameover"){
    drawText("Game Over",40,canvas.height/2);
    drawText("Score: "+score,20,canvas.height/2+40);

    let y=canvas.height/2+100;
    leaderboard.forEach((s,i)=>{
      drawText(`${i+1}. ${s.name}: ${s.score}`,18,y);
      y+=25;
    });

    drawText("Tap to Restart",20,y+20);
  }

  frame++;
  requestAnimationFrame(gameLoop);
}

// 🎮 INPUT
function handleInput(){
  startSounds();

  if(gameState==="start"){
    gameState="playing";
  }
  else if(gameState==="playing"){
    bird.velocity=bird.lift;
    play(flapSound);
  }
  else location.reload();
}

document.addEventListener("click",handleInput);
document.addEventListener("keydown",handleInput);

gameLoop();
</script>

</body>
</html>
