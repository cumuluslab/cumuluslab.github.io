<!DOCTYPE html>
<html>
<head>
  <title>Cumulus Lab - Flappy Bird</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: #70c5ce;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Full screen
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let groundHeight = 80;

// Bird
let bird = {
  x: 80,
  y: canvas.height / 2,
  size: 20,
  gravity: 0.4,
  lift: -8,
  velocity: 0,
  flap: 0
};

// Game state
let pipes = [];
let frame = 0;
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
let gameState = "start"; // start, playing, gameover

// Background scroll
let bgX = 0;

// Draw sky (moving)
function drawBackground() {
  bgX -= 0.5;
  if (bgX <= -canvas.width) bgX = 0;

  ctx.fillStyle = "#70c5ce";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#aeefff";
  for (let i = 0; i < 2; i++) {
    ctx.fillRect(bgX + i * canvas.width, 0, canvas.width, canvas.height);
  }
}

// Draw ground
function drawGround() {
  ctx.fillStyle = "#ded895";
  ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);

  ctx.fillStyle = "#c2b280";
  for (let i = 0; i < canvas.width; i += 40) {
    ctx.fillRect(i, canvas.height - groundHeight, 20, 10);
  }
}

// Bird (flapping animation)
function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(0, 0, bird.size, 0, Math.PI * 2);
  ctx.fill();

  // Wing animation
  ctx.fillStyle = "orange";
  ctx.beginPath();
  ctx.ellipse(-5, bird.flap, 10, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// Pipes
function drawPipes() {
  pipes.forEach(pipe => {
    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height);

    // pipe cap
    ctx.fillStyle = "#27ae60";
    ctx.fillRect(pipe.x - 5, pipe.top - 20, pipe.width + 10, 20);
    ctx.fillRect(pipe.x - 5, pipe.bottom, pipe.width + 10, 20);
  });
}

// Update pipes
function updatePipes() {
  if (frame % 100 === 0) {
    let top = Math.random() * 200 + 50;
    let gap = 160;

    pipes.push({
      x: canvas.width,
      width: 60,
      top: top,
      bottom: top + gap,
      passed: false
    });
  }

  pipes.forEach(pipe => {
    pipe.x -= 3;

    if (!pipe.passed && pipe.x + pipe.width < bird.x) {
      score++;
      pipe.passed = true;
    }

    // Collision
    if (
      bird.x + bird.size > pipe.x &&
      bird.x - bird.size < pipe.x + pipe.width &&
      (bird.y - bird.size < pipe.top ||
       bird.y + bird.size > pipe.bottom)
    ) {
      gameState = "gameover";
    }
  });

  pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
}

// Update bird
function updateBird() {
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  bird.flap = Math.sin(frame * 0.3) * 8;

  if (bird.y + bird.size > canvas.height - groundHeight) {
    gameState = "gameover";
  }
}

// UI
function drawText(text, size, y) {
  ctx.fillStyle = "white";
  ctx.font = size + "px Arial";
  ctx.textAlign = "center";
  ctx.fillText(text, canvas.width / 2, y);
}

// Game loop
function gameLoop() {
  drawBackground();
  drawPipes();
  drawGround();
  drawBird();

  if (gameState === "start") {
    drawText("Tap to Start", 40, canvas.height / 2);
    drawText("High Score: " + highScore, 20, canvas.height / 2 + 40);
  }

  if (gameState === "playing") {
    updateBird();
    updatePipes();
    drawText("Score: " + score, 20, 40);
  }

  if (gameState === "gameover") {
    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
    }

    drawText("Game Over", 40, canvas.height / 2);
    drawText("Score: " + score, 20, canvas.height / 2 + 40);
    drawText("High Score: " + highScore, 20, canvas.height / 2 + 70);
    drawText("Tap to Restart", 20, canvas.height / 2 + 110);
  }

  frame++;
  requestAnimationFrame(gameLoop);
}

// Controls
function handleInput() {
  if (gameState === "start") {
    gameState = "playing";
  } else if (gameState === "playing") {
    bird.velocity = bird.lift;
  } else if (gameState === "gameover") {
    location.reload();
  }
}

document.addEventListener("click", handleInput);
document.addEventListener("keydown", handleInput);

gameLoop();
</script>

</body>
</html>
