<!DOCTYPE html>
<html>
<head>
  <title>Cumulus Lab - Flappy Bird</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let groundHeight = 100;

// 🔊 SOUND SYSTEM
let soundsStarted = false;

const flapSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const scoreSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const hitSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg");
const bgMusic = new Audio("https://actions.google.com/sounds/v1/ambiences/birds_in_forest.ogg");

bgMusic.loop = true;
bgMusic.volume = 0.3;

function startSounds() {
  if (!soundsStarted) {
    bgMusic.play().catch(()=>{});
    soundsStarted = true;
  }
}

function play(sound) {
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

// Bird
let bird = {
  x: 80,
  y: canvas.height / 2,
  size: 20,
  gravity: 0.4,
  lift: -8,
  velocity: 0,
  flap: 0
};

let pipes = [];
let frame = 0;
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
let gameState = "start";

let bgX = 0;
let groundX = 0;

// Clouds
let clouds = [
  {x: 100, y: 100},
  {x: 300, y: 150},
  {x: 600, y: 80}
];

function drawSky() {
  let gradient = ctx.createLinearGradient(0,0,0,canvas.height);
  gradient.addColorStop(0, "#70c5ce");
  gradient.addColorStop(1, "#dff6ff");
  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawClouds() {
  ctx.fillStyle = "white";
  clouds.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, 20, 0, Math.PI*2);
    ctx.arc(c.x+20, c.y, 20, 0, Math.PI*2);
    ctx.arc(c.x+10, c.y-15, 20, 0, Math.PI*2);
    ctx.fill();

    c.x -= 0.5;
    if (c.x < -50) c.x = canvas.width + 50;
  });
}

function drawGround() {
  groundX -= 3;
  if (groundX <= -40) groundX = 0;

  ctx.fillStyle = "#ded895";
  ctx.fillRect(0, canvas.height-groundHeight, canvas.width, groundHeight);

  ctx.fillStyle = "#c2b280";
  for (let i = groundX; i < canvas.width; i += 40) {
    ctx.fillRect(i, canvas.height-groundHeight, 20, 10);
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(0,0,bird.size,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "orange";
  ctx.beginPath();
  ctx.ellipse(-5, bird.flap, 12, 6, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(5,-5,5,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(6,-5,2,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "orange";
  ctx.beginPath();
  ctx.moveTo(15,0);
  ctx.lineTo(25,5);
  ctx.lineTo(15,10);
  ctx.fill();

  ctx.restore();
}

function drawPipes() {
  pipes.forEach(pipe => {
    let grad = ctx.createLinearGradient(pipe.x,0,pipe.x+pipe.width,0);
    grad.addColorStop(0, "#2ecc71");
    grad.addColorStop(1, "#27ae60");

    ctx.fillStyle = grad;
    ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
    ctx.fillRect(pipe.x,pipe.bottom,pipe.width,canvas.height);

    ctx.fillStyle = "#145a32";
    ctx.fillRect(pipe.x-5, pipe.top-20, pipe.width+10, 20);
    ctx.fillRect(pipe.x-5, pipe.bottom, pipe.width+10, 20);
  });
}

function updatePipes() {
  if (frame % 100 === 0) {
    let top = Math.random()*200+50;
    let gap = 160;

    pipes.push({
      x: canvas.width,
      width: 60,
      top: top,
      bottom: top + gap,
      passed: false
    });
  }

  pipes.forEach(pipe => {
    pipe.x -= 3;

    if (!pipe.passed && pipe.x + pipe.width < bird.x) {
      score++;
      pipe.passed = true;
      play(scoreSound); // 🔊 score
    }

    if (
      bird.x + bird.size > pipe.x &&
      bird.x - bird.size < pipe.x + pipe.width &&
      (bird.y - bird.size < pipe.top ||
       bird.y + bird.size > pipe.bottom)
    ) {
      gameState = "gameover";
      play(hitSound); // 🔊 hit
    }
  });

  pipes = pipes.filter(p => p.x + p.width > 0);
}

function updateBird() {
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;
  bird.flap = Math.sin(frame * 0.3) * 8;

  if (bird.y + bird.size > canvas.height-groundHeight) {
    gameState = "gameover";
    play(hitSound);
  }
}

function drawText(text,size,y){
  ctx.fillStyle="white";
  ctx.font=size+"px Arial";
  ctx.textAlign="center";
  ctx.fillText(text, canvas.width/2, y);
}

function gameLoop() {
  drawSky();
  drawClouds();
  drawPipes();
  drawGround();
  drawBird();

  if (gameState==="start"){
    drawText("Tap to Start",40,canvas.height/2);
    drawText("High Score: "+highScore,20,canvas.height/2+40);
  }

  if (gameState==="playing"){
    updateBird();
    updatePipes();
    drawText("Score: "+score,20,40);
  }

  if (gameState==="gameover"){
    if(score>highScore){
      highScore=score;
      localStorage.setItem("highScore",highScore);
    }

    drawText("Game Over",40,canvas.height/2);
    drawText("Score: "+score,20,canvas.height/2+40);
    drawText("High Score: "+highScore,20,canvas.height/2+70);
    drawText("Tap to Restart",20,canvas.height/2+110);
  }

  frame++;
  requestAnimationFrame(gameLoop);
}

function handleInput(){
  startSounds(); // 🔥 unlock audio

  if(gameState==="start") gameState="playing";
  else if(gameState==="playing"){
    bird.velocity = bird.lift;
    play(flapSound); // 🔊 flap
  }
  else location.reload();
}

document.addEventListener("click",handleInput);
document.addEventListener("keydown",handleInput);

gameLoop();
</script>

</body>
</html>
