<!DOCTYPE html>
<html>
<head>
  <title>Cumulus Lab - Flappy Bird</title>
  <style>
    body {
      margin: 0;
      background: #70c5ce;
      text-align: center;
      font-family: Arial;
    }
    canvas {
      display: block;
      margin: auto;
      background: #70c5ce;
    }
    h1 {
      color: white;
    }
  </style>
</head>
<body>

<h1>☁️ Cumulus Lab - Flappy Bird</h1>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let bird = {
  x: 80,
  y: 250,
  radius: 12,
  gravity: 0.5,
  lift: -8,
  velocity: 0
};

let pipes = [];
let frame = 0;
let score = 0;
let gameOver = false;

function drawBird() {
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
  ctx.fillStyle = "yellow";
  ctx.fill();
}

function drawPipes() {
  ctx.fillStyle = "green";
  pipes.forEach(pipe => {
    ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height);
  });
}

function updatePipes() {
  if (frame % 100 === 0) {
    let top = Math.random() * 250 + 50;
    let gap = 140;

    pipes.push({
      x: canvas.width,
      width: 50,
      top: top,
      bottom: top + gap,
      passed: false
    });
  }

  pipes.forEach(pipe => {
    pipe.x -= 2;

    // Score
    if (!pipe.passed && pipe.x + pipe.width < bird.x) {
      score++;
      pipe.passed = true;
    }

    // Collision
    if (
      bird.x + bird.radius > pipe.x &&
      bird.x - bird.radius < pipe.x + pipe.width &&
      (bird.y - bird.radius < pipe.top ||
       bird.y + bird.radius > pipe.bottom)
    ) {
      gameOver = true;
    }
  });

  pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
}

function updateBird() {
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
    gameOver = true;
  }
}

function drawScore() {
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);
}

function drawGameOver() {
  ctx.fillStyle = "red";
  ctx.font = "30px Arial";
  ctx.fillText("Game Over", 120, 300);
  ctx.font = "16px Arial";
  ctx.fillText("Click to Restart", 135, 340);
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBird();
  drawPipes();
  drawScore();

  if (!gameOver) {
    updateBird();
    updatePipes();
    frame++;
    requestAnimationFrame(gameLoop);
  } else {
    drawGameOver();
  }
}

function flap() {
  if (gameOver) {
    location.reload();
  } else {
    bird.velocity = bird.lift;
  }
}

document.addEventListener("keydown", flap);
document.addEventListener("click", flap);

gameLoop();
</script>

</body>
</html>
